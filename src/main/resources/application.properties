# ============================================
# CipherVault - Application Configuration
# ============================================

# Server
server.port=${PORT:8080}
spring.application.name=CipherVault
server.forward-headers-strategy=framework

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

# AES Encryption Secret (change this in production!)
ciphervault.aes.secret=${AES_SECRET}

# HaveIBeenPwned API
ciphervault.hibp.api.url=https://api.pwnedpasswords.com/range/

# Logging
logging.level.com.ciphervault=INFO
logging.level.org.springframework.security=WARN

# Errors (avoid leaking stacktraces)
server.error.include-stacktrace=never

# Actuator (for Railway/Render health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
