# ============================================
# CipherVault - Application Configuration
# ============================================

# Server
server.port=8080
spring.application.name=CipherVault

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ciphervault?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Session
server.servlet.session.timeout=30m

# AES Encryption Secret (change this in production!)
ciphervault.aes.secret=CipherVault@AES256SecretKey!2024

# HaveIBeenPwned API
ciphervault.hibp.api.url=https://api.pwnedpasswords.com/range/

# Logging
logging.level.com.ciphervault=INFO
logging.level.org.springframework.security=WARN
