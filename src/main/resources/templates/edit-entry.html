<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherVault — Edit Secret</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="vault-body">

<div class="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-shield-lock-fill"></i>
        <span>CipherVault</span>
    </div>
    <nav class="sidebar-nav">
        <a href="/vault" class="nav-item">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="/vault/add" class="nav-item">
            <i class="bi bi-plus-circle-fill"></i> Add Secret
        </a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </form>
    </div>
</div>

<div class="main-content">
    <div class="page-header mb-5">
        <div>
            <h1 class="page-title">Edit Secret</h1>
            <p class="page-sub" th:text="'Editing: ' + ${entry.title}"></p>
        </div>
        <a href="/vault" class="btn-cv-secondary">
            <i class="bi bi-arrow-left me-2"></i>Back
        </a>
    </div>

    <!-- Breach warning -->
    <div th:if="${entry.isBreached()}" class="alert alert-danger-cv mb-4">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        This password was found in <strong th:text="${entry.breachCount}"></strong> data breach(es).
        <strong>You should change it immediately.</strong>
    </div>

    <div class="form-card">
        <form th:action="@{/vault/edit/{id}(id=${entry.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="form-group-cv">
                        <label class="form-label-cv">Title *</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-tag input-icon"></i>
                            <input type="text" name="title" class="form-control-cv"
                                   th:value="${entry.title}" required>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group-cv">
                        <label class="form-label-cv">Website URL</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-globe input-icon"></i>
                            <input type="text" name="siteUrl" class="form-control-cv"
                                   th:value="${entry.siteUrl}">
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group-cv">
                        <label class="form-label-cv">Username / Email *</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-person input-icon"></i>
                            <input type="text" name="entryUsername" class="form-control-cv"
                                   th:value="${decUsername}" required>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group-cv">
                        <label class="form-label-cv">Category</label>
                        <select name="category" class="form-select-cv">
                            <option value="General"    th:selected="${entry.category == 'General'}">General</option>
                            <option value="Social"     th:selected="${entry.category == 'Social'}">Social Media</option>
                            <option value="Banking"    th:selected="${entry.category == 'Banking'}">Banking</option>
                            <option value="Work"       th:selected="${entry.category == 'Work'}">Work</option>
                            <option value="Shopping"   th:selected="${entry.category == 'Shopping'}">Shopping</option>
                            <option value="Email"      th:selected="${entry.category == 'Email'}">Email</option>
                        </select>
                    </div>
                </div>

                <div class="col-12">
                    <div class="form-group-cv">
                        <label class="form-label-cv">Password *</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" name="entryPassword" id="entryPassword"
                                   class="form-control-cv" th:value="${decPassword}" required
                                   oninput="liveStrength(this.value)">
                            <button type="button" class="toggle-password"
                                    onclick="togglePasswordVisibility('entryPassword', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button type="button" class="btn-generate" onclick="generatePassword()"
                                    title="Generate Password">
                                <i class="bi bi-lightning-charge-fill"></i>
                            </button>
                        </div>
                        <div class="strength-bar-wrap mt-2">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <small class="strength-label" id="strengthLabel"></small>
                    </div>
                </div>

                <div class="col-12 d-flex gap-3">
                    <button type="submit" class="btn-cv-primary px-5">
                        <i class="bi bi-shield-lock-fill me-2"></i>Save Changes
                    </button>
                    <a href="/vault" class="btn-cv-secondary px-4">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/vault.js}"></script>
<script th:inline="javascript">
    // Auto-trigger strength bar on page load with existing password
    window.addEventListener('DOMContentLoaded', () => {
        const pw = document.getElementById('entryPassword');
        if (pw && pw.value) liveStrength(pw.value);
    });
</script>
</body>
</html>
