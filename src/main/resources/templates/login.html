<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherVault — Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="bg-grid"></div>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Brand -->
        <div class="auth-brand">
            <div class="brand-icon-lg"><i class="bi bi-shield-lock-fill"></i></div>
            <h2 class="auth-title">CipherVault</h2>
            <p class="auth-subtitle">Enter your vault credentials</p>
        </div>

        <!-- Alerts -->
        <div th:if="${error}" class="alert alert-danger-cv" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
        </div>
        <div th:if="${logout}" class="alert alert-info-cv" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${logout}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success-cv" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}"></span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">
            <div class="form-group-cv mb-4">
                <label class="form-label-cv">Username</label>
                <div class="input-icon-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" name="username" class="form-control-cv"
                           placeholder="your_username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group-cv mb-4">
                <label class="form-label-cv">Master Password</label>
                <div class="input-icon-wrapper">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" name="password" id="loginPassword" class="form-control-cv"
                           placeholder="••••••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <button type="submit" class="btn-cv-primary w-100 mt-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Unlock Vault
            </button>
        </form>

        <div class="auth-footer-link mt-4 text-center">
            Don't have a vault? <a th:href="@{/register}">Create one</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/vault.js}"></script>
</body>
</html>
